name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # Frontend: lint + type-check + build
  # ──────────────────────────────────────────
  frontend:
    name: Frontend (lint + type-check + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_key
          VITE_API_URL: https://placeholder.api.co
  # ──────────────────────────────────────────
  # Backend: type-check + test
  # ──────────────────────────────────────────
  backend:
    name: Backend (type-check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type-check
        run: npm run type-check
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder_key
          OPENAI_API_KEY: placeholder_key
  # ──────────────────────────────────────────
  # Notify Railway to trigger deployment
  # Railway auto-deploys on push to main via
  # its GitHub integration. This job serves
  # as a deployment gate and status reporter.
  # ──────────────────────────────────────────
  deploy:
    name: Trigger Railway Deploy
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Railway deployment
        run: |
          echo "✅ CI passed. Railway will auto-deploy from the main branch push."
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Message: ${{ github.event.head_commit.message }}"

      # Optional: trigger Railway deploy via webhook if RAILWAY_DEPLOY_WEBHOOK is set
      - name: Trigger Railway webhook (if configured)
        if: ${{ env.RAILWAY_DEPLOY_WEBHOOK != '' }}
        run: |
          curl -X POST "$RAILWAY_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"ref": "${{ github.sha }}"}'
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
